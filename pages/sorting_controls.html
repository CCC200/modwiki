<div class="dex-controls-container">
    <div class="controls-grid">
        
        <!-- Search Section -->
        <div class="control-section search-section">
            <label>Search</label>
            <input type="text" id="dex-search" placeholder="Search by name...">
        </div>

        <!-- Primary Sort -->
        <div class="control-section">
            <label>Primary Sort</label>
            <div class="input-group">
                <select id="primary-sort">
                    <option value="name" selected>Name</option>
                    <option value="hp">HP</option>
                    <option value="atk">Attack</option>
                    <option value="def">Defense</option>
                    <option value="spa">Sp. Atk</option>
                    <option value="spd">Sp. Def</option>
                    <option value="spe">Speed</option>
                    <option value="bst">BST</option>
                    <option value="tier">Tier</option>
                </select>
                <button type="button" class="dir-toggle" id="primary-dir" data-dir="dsc" onclick="toggleDir(this)">DSC</button>
            </div>
        </div>

        <!-- Secondary Sort (Tie-breaker) -->
        <div class="control-section">
            <label>Tie-breaker</label>
            <div class="input-group">
                <select id="secondary-sort">
                    <option value="none" selected>None</option>
                    <option value="name">Name</option>
                    <option value="hp">HP</option>
                    <option value="atk">Attack</option>
                    <option value="def">Defense</option>
                    <option value="spa">Sp. Atk</option>
                    <option value="spd">Sp. Def</option>
                    <option value="spe">Speed</option>
                    <option value="bst">BST</option>
                    <option value="tier">Tier</option>
                </select>
                <button type="button" class="dir-toggle" id="secondary-dir" data-dir="dsc" onclick="toggleDir(this)">DSC</button>
            </div>
        </div>

        <!-- Action Button -->
        <div class="control-section action-section">
            <button id="apply-filters" onclick="applyDexChanges()">Go</button>
        </div>
    </div>
</div>
